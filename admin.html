<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ES Transportation</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f2440;--mid:#1a3a5c;--sky:#7ec8f7;--gold:#f0c030;--bg:#f4f7fb}
body{font-family:Barlow,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
.ls{width:100%;max-width:400px;text-align:center;display:flex;flex-direction:column;align-items:center}
.ls img{height:90px;width:auto;margin-bottom:28px}
.lc{background:var(--navy);border-radius:16px;padding:32px 28px;box-shadow:0 8px 40px rgba(15,36,64,.2);width:100%}
.lc h2{font-family:"Barlow Condensed",sans-serif;font-size:24px;font-weight:800;color:#fff;margin-bottom:4px}
.lsvc{color:var(--sky);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;display:block}
.lc input{width:100%;padding:13px 16px;border-radius:8px;border:2px solid rgba(126,200,247,.25);background:rgba(255,255,255,.07);color:#fff;font-size:18px;font-family:Barlow,sans-serif;outline:none;margin-bottom:14px;transition:border-color .2s}
.lc input:focus{border-color:var(--sky)}
.lc input::placeholder{color:rgba(255,255,255,.3)}
.lbtn{width:100%;padding:13px;background:var(--sky);color:var(--navy);border:none;border-radius:8px;font-weight:700;font-size:15px;font-family:Barlow,sans-serif;cursor:pointer}
.lerr{font-size:13px;color:#f87171;margin-top:12px;display:none}
.lerr.show{display:block}
.as{display:none;width:100%;max-width:460px}
.as.show{display:block}
.lo{background:#fff;border:2px solid #e0e8f0;font-size:13px;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;color:#c0392b;border-radius:8px;padding:8px 18px;display:block;margin:0 0 20px auto}
.br{text-align:center;margin-bottom:28px}
.br img{height:80px;width:auto}
.bdg{display:inline-block;background:var(--gold);color:#5a3c00;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-top:8px}
.cd{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 24px rgba(15,36,64,.1);margin-bottom:16px}
.cd h2{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:20px}
label{display:block;font-size:12px;font-weight:700;color:var(--mid);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
input[type=text],textarea{width:100%;padding:12px 14px;border:2px solid #e0e8f0;border-radius:8px;font-size:14px;font-family:Barlow,sans-serif;color:var(--navy);outline:none;transition:border-color .2s;margin-bottom:16px;background:#fff}
input[type=text]:focus,textarea:focus{border-color:var(--sky)}
textarea{resize:vertical;min-height:70px}
.lr{display:flex;gap:8px;margin-bottom:0}
.lr input{margin-bottom:0;flex:1}
.lkb{padding:12px 18px;background:var(--mid);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;font-family:Barlow,sans-serif;cursor:pointer;white-space:nowrap}
.lkb:disabled{opacity:.6;cursor:not-allowed}
.csb{border-radius:8px;padding:12px 14px;margin:10px 0 16px;font-size:13px;display:none;line-height:1.6}
.csb.show{display:block}
.csb.normal{background:#f0f4f8;border:2px solid #dce6f0;color:var(--mid)}
.csb.warn{background:#fff8e6;border:2px solid var(--gold);color:#7a5000}
.ext{display:flex;align-items:center;gap:10px;background:#f0f4f8;border:2px solid #e0e8f0;border-radius:8px;padding:12px 14px;margin-bottom:16px;cursor:pointer}
.ext input[type=checkbox]{width:18px;height:18px;accent-color:var(--navy);cursor:pointer;margin:0}
.ext span{font-size:13px;font-weight:600;color:var(--mid)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sb{padding:10px 8px;border:2px solid #e0e8f0;border-radius:8px;background:#fff;font-size:12px;font-weight:600;color:#556;cursor:pointer;text-align:center;font-family:Barlow,sans-serif}
.sb.sel{border-color:var(--navy);background:var(--navy);color:var(--sky)}
.sb.hide{display:none}
    .sb.esb{opacity:.4;pointer-events:none;}
    .sb.esb.enabled{opacity:1;pointer-events:auto;}
.sub{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:Barlow,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.sub:disabled{opacity:.6;cursor:not-allowed}
.sp{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.sub.ld .sp{display:block}
.sub.ld .bt{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{display:none;background:#e6f9ee;border:1.5px solid #52c77a;border-radius:10px;padding:16px;font-size:15px;color:#1a6b3a;font-weight:700;text-align:center;margin-top:14px}
.ok.show{display:block;animation:fu .3s ease}
.er{display:none;background:#fdf0ee;border:1.5px solid #e74c3c;border-radius:10px;padding:14px;font-size:13px;color:#c0392b;font-weight:600;text-align:center;margin-top:12px}
.er.show{display:block}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fb{display:flex;gap:12px;justify-content:center;margin-top:24px}
.fb a{padding:10px 22px;background:var(--navy);color:var(--sky);border-radius:8px;font-family:Barlow,sans-serif;font-size:13px;font-weight:700;text-decoration:none}
</style>
</head>

<script>
var PIN="9193",SU="https://script.google.com/macros/s/AKfycbxKk97GyXTknalNGOLyUvMIgFjGlHNT0c5gu4UwDoRfmm11-nakwY3ddoglBmgFjSh5tA/exec",CU="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCW5r0xE92x-KUG5QjmOmBMBeKq1PKzsA8CHa_vJ-FdTf6sOUbXGMS-XyfErxaZS8U-xPHrASDCl0K/pub?gid=672910122&single=true&output=csv",SN="driver-orders",SC=12,NC=13,EC=11,sel="";

document.getElementById("LBTN").addEventListener("click", checkPin);
document.getElementById("LOBTN").addEventListener("click", logout);
document.getElementById("LKB").addEventListener("click", function(){ lookupOrder(false); });
document.getElementById("EXTTOG").addEventListener("click", toggleExtra);
document.getElementById("EXT").addEventListener("click", function(e){ e.stopPropagation(); toggleExtra(); });
document.getElementById("SBTN").addEventListener("click", submitUpdate);
document.addEventListener("keydown", function(e){
  if(e.key==="Enter" && document.getElementById("LS").style.display!=="none") checkPin();
});

if(sessionStorage.getItem("adm_"+SN)==="1"){
  document.getElementById("LS").style.display="none";
  document.getElementById("AS").classList.add("show");
}

function checkPin(){
  if(document.getElementById("PIN").value.trim()===PIN){
    document.getElementById("LS").style.display="none";
    document.getElementById("AS").classList.add("show");
    sessionStorage.setItem("adm_"+SN,"1");
  } else {
    document.getElementById("LERR").classList.add("show");
    document.getElementById("PIN").value="";
  }
}

function logout(){
  sessionStorage.removeItem("adm_"+SN);
  document.getElementById("AS").classList.remove("show");
  document.getElementById("LS").style.display="flex";
}

async function lookupOrder(silent){
  var on=document.getElementById("ON").value.trim().toUpperCase();
  var box=document.getElementById("CSB");
  var btn=document.getElementById("LKB");
  if(!on){ if(!silent) alert("Enter an order number first."); return; }
  if(!silent){ btn.disabled=true; btn.textContent="Looking up..."; }
  try{
    var p=new URLSearchParams({action:"lookup",order:on,sheet:SN});
    var res=await fetch(SU+"?"+p.toString());
    var data=await res.json();
    if(data.found){
      var st=data.status||"Not set";
      var nt=data.notes||"";
      var ex=data.extra_stop&&data.extra_stop.toLowerCase()==="yes";
      var done=st==="Completed"||st==="Delivered";
      box.className="csb show "+(done?"warn":"normal");
      box.innerHTML="<strong>Current Status:</strong> "+st+(nt?" &middot; <strong>Notes:</strong> "+nt:"")+(ex?" &middot; <strong>Extra Stop:</strong> Yes":"");
      document.getElementById("EXT").checked=ex;
      document.querySelectorAll(".esb").forEach(function(b){ b.classList.toggle("enabled",ex); });
    } else {
      box.className="csb show normal"; box.innerHTML="Order not found.";
    }
  } catch(e){ box.className="csb show normal"; box.innerHTML="Could not load data: "+e.message; }
  if(!silent){ btn.disabled=false; btn.textContent="Look Up"; }
}

function toggleExtra(){
  var cb=document.getElementById("EXT");
  cb.checked=!cb.checked;
  document.querySelectorAll(".esb").forEach(function(b){ b.classList.toggle("enabled",cb.checked); });
  if(!cb.checked&&sel==="Extra Stop"){ sel=""; document.querySelectorAll(".sb").forEach(function(b){ b.classList.remove("sel"); }); }
}

function selectStatus(el,s){
  document.querySelectorAll(".sb").forEach(function(b){ b.classList.remove("sel"); });
  el.classList.add("sel"); sel=s;
}

async function submitUpdate(){
  var on=document.getElementById("ON").value.trim();
  var nt=document.getElementById("NT").value.trim();
  var ex=document.getElementById("EXT").checked?"yes":"no";
  var ok=document.getElementById("OK");
  var er=document.getElementById("ER");
  var btn=document.getElementById("SBTN");
  ok.classList.remove("show"); er.classList.remove("show");
  if(!on){ alert("Please enter an order number."); return; }
  if(!sel){ alert("Please select a status."); return; }
  btn.classList.add("ld"); btn.disabled=true;
  var p=new URLSearchParams({order:on,status:sel,notes:nt,extra_stop:ex,sheet:SN});
  try{
    await fetch(SU+"?"+p.toString(),{method:"GET",mode:"no-cors"});
    await new Promise(function(r){ setTimeout(r,2000); });
    await lookupOrder(true);
    ok.innerHTML="&#10003; <strong>"+on+"</strong> updated to <strong>"+sel+"</strong>";
    ok.classList.add("show");
    document.getElementById("NT").value="";
    document.querySelectorAll(".sb").forEach(function(b){ b.classList.remove("sel"); });
    sel="";
  } catch(e){ er.textContent="Update failed. Try again."; er.classList.add("show"); }
  finally{ btn.classList.remove("ld"); btn.disabled=false; }
}

</script>
</body>
</html>
